name: Fog Forecast

on:
  schedule:
    # Всеки час от 18 до 23 UTC (по UTC cron)
    - cron: '5 18,19,20,21,22,23 * * *'
  workflow_dispatch:   # позволява ръчно пускане от GitHub

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fog model
        run: python run_operational.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ docs/
          git diff --cached --quiet || git commit -m "Forecast update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
